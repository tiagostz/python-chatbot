<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hashzap</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.1/socket.io.js" integrity="sha512-Z6C1p1NIexPj5MsVUunW4pg7uMX6/TT3CUVldmjXx2kpip1eZcrAnxIusDxyFIikyM9A61zOVNgvLr/TGudOQg==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.0/jquery.min.js" integrity="sha512-3gJwYpMe3QewGELv8k/BX9vcqhryRdzRMxVfq6ngyWXwo03GFEzjsUm8Q7RZcHPHksttq7/GFoxjCVUjkjvPdw==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            background: #0f172a;
            color: #e5e7eb;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .chat-container {
            background: #020617;
            border-radius: 12px;
            width: 100%;
            max-width: 480px;
            box-shadow: 0 20px 40px rgba(15, 23, 42, 0.7);
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .chat-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 4px;
        }

        .chat-header h1 {
            font-size: 1.25rem;
        }

        .chat-footer {
            margin-top: 4px;
            font-size: 0.7rem;
            color: #6b7280;
            text-align: right;
        }

        #lista_mensagens {
            background: #020617;
            border: 1px solid #1f2937;
            border-radius: 8px;
            padding: 8px;
            height: 320px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 4px;
            font-size: 0.9rem;
        }

        #lista_mensagens p {
            background: #111827;
            padding: 6px 8px;
            border-radius: 6px;
            word-wrap: break-word;
        }

        .inputs {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .inputs-row {
            display: flex;
            gap: 8px;
        }

        input[type="text"] {
            flex: 1;
            padding: 8px 10px;
            border-radius: 6px;
            border: 1px solid #374151;
            background: #020617;
            color: #e5e7eb;
        }

        input::placeholder {
            color: #6b7280;
        }

        #botao {
            width: 100%;
            padding: 10px;
            border: none;
            border-radius: 6px;
            background: #22c55e;
            color: #022c22;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.15s ease, transform 0.05s ease;
        }

        #botao:hover {
            background: #16a34a;
        }

        #botao:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body>
   <div class="chat-container">
        <div class="chat-header">
            <h1>Hashzap</h1>
        </div>
    
        <div id="lista_mensagens">
           
        </div>

        <div class="inputs">
            <div class="inputs-row">
                <input type="text" id="usuario" placeholder="Usuário" required>
                <input type="text" id="mensagem" placeholder="Mensagem" required>
            </div>
            <button id="botao">Enviar</button>
        </div>

        <div class="chat-footer">
            Desenvolvido por Tiago dos Santos
        </div>
   </div>

    <script type="text/javascript">
        $(document).ready(function(){

            // conecta ao mesmo servidor que serviu esta página (mesma origem)
            var socket = io();
            socket.on("connect", function(){
                console.log("Usuario conectou");
            });

            socket.on("message", function(data){
                console.log("disparou uma mensagem")
                $("#lista_mensagens").append($("<p>").text(data));
            });

          
           $("#botao").on("click", function(){
                console.log("clicou no botao");
                socket.send($("#usuario").val() + ": " + $("#mensagem").val());
                // limpa apenas o campo de mensagem
                $("#mensagem").val("");
            });
            


        })
    </script>
    
</body>
</html>
